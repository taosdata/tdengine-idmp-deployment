services:
  tdengine-tdgpt:
    image: tdengine/tdgpt-full:${TDGPT_TAG:-latest}
    container_name: tdengine-tdgpt
    hostname: tdengine-tdgpt
    restart: always
    environment:
      TZ: "${TZ:-UTC}"
    ports:
      - "6035:6035"
      - "6061:6061"
      - "6062:6062"
    networks:
      - taos_net
    healthcheck:
      test: [
        "CMD",
        "python3",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:6035').read()"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  tdengine-tsdb:
    image: tdengine/tsdb-ee:${TSDB_TAG:-latest}
    container_name: tdengine-tsdb
    hostname: tdengine
    restart: always
    environment:
      TZ: "${TZ:-UTC}"
      EXPLORER_SKIP_REGISTER: "${EXPLORER_SKIP_REGISTER:-true}"
      TAOS_FQDN: "${TAOS_FQDN:-tdengine-tsdb}"
    ports:
      - "6030:6030"
      - "6041:6041"
      - "6060:6060"
    volumes:
      - tsdb_data:/var/lib/taos
      - tsdb_log:/var/log/taos
      - ./init-anode.sql:/docker-entrypoint-initdb.d/init-anode.sql
    networks:
      - taos_net
    depends_on:
      tdengine-tdgpt:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "taos", "-h", "localhost", "-s", "show databases;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  tdengine-idmp:
    image: tdengine/idmp-ee:${IDMP_TAG:-latest}
    container_name: tdengine-idmp
    restart: always
    depends_on:
      tdengine-tsdb:
        condition: service_healthy
    environment:
      TZ: "${TZ:-UTC}"
      TSDB_URL: "http://tdengine-tsdb:6041"
      TDA_ANALYSIS_EVENT_URLS: "ws://tdengine-idmp:6042"
      QUARKUS_PROFILE: "${QUARKUS_PROFILE:-prod}"
      IDMP_URL: "${IDMP_URL:-http://localhost:6042}"
      TDA_REST_BASE_PATH: "${TDA_REST_BASE_PATH:-}"
      AI_SERVER_URL: "http://tdengine-idmp-ai:6040"
      TDA_AI_CONN_ZH: "${TDA_AI_CONN_ZH:-DeepSeek}"
      TDA_AI_CONN_EN: "${TDA_AI_CONN_EN:-OpenAI}"
      TDA_GIT_ENABLE: "${TDA_GIT_ENABLE:-false}"
    ports:
      - "6034:6034"
      - "6038:6038"
      - "6042:6042"
    volumes:
      - idmp_data:/var/lib/taos
      - idmp_log:/var/log/taos
    networks:
      - taos_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6042/q/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  tdengine-idmp-ai:
    image: tdengine/idmp-ai-ee:${IDMP_AI_TAG:-latest}
    container_name: tdengine-idmp-ai
    restart: always
    environment:
      TZ: "${TZ:-UTC}"
      IDMP_URL: "${IDMP_URL:-http://tdengine-idmp:6042}"
      IDMP_JAVA_API_URL: "http://tdengine-idmp:6042/"
      TDA_AI_CONN_ZH: "${TDA_AI_CONN_ZH:-DeepSeek}"
      TDA_AI_CONN_EN: "${TDA_AI_CONN_EN:-OpenAI}"
    ports:
      - "6040:6040"
    volumes:
      - idmp_data:/var/lib/taos
      - idmp_log:/var/log/taos
    networks:
      - taos_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6040' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  tdengine-model:
    image: tdengine/tdmodel:${TDMODEL_TAG:-latest}
    container_name: tdengine-model
    restart: always
    depends_on:
      tdengine-tsdb:
        condition: service_healthy
    environment:
      TDMODEL_TSDB_HOST: "${TDMODEL_TSDB_HOST:-tdengine-tsdb}"
      TDMODEL_TSDB_PORT: "${TDMODEL_TSDB_PORT:-6041}"
    ports:
      - "6036:6036"
    volumes:
      - tdmodel_data:/var/lib/taos
      - tdmodel_log:/var/log/taos
    networks:
      - taos_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6036' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  taos_net:
    driver: bridge

volumes:
  tsdb_data:
    driver: local
  tsdb_log:
    driver: local
  idmp_data:
    driver: local
  idmp_log:
    driver: local
  tdmodel_data:
    driver: local
  tdmodel_log:
    driver: local
